<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maserati - Next Gen. Experience - Hristiyan Stratev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter+Display:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::selection { background: #111; color: #fff; }
    ::-moz-selection { background: #111; color: #fff; }
    html { -webkit-font-smoothing: antialiased; font-size: 16px; }
    body { background: #ffffff; color: #111111; font-family: 'Inter Display', sans-serif; font-weight: 400; overflow-x: hidden; cursor: none; }
    body.no-scroll { overflow: hidden; }
    body, body * { cursor: none; }
    body { opacity: 0; transition: opacity 0.35s ease; }
    body.loaded { opacity: 1; }
    a { color: inherit; text-decoration: none; }

    #cursor { position: fixed; width: 26px; height: 26px; border-radius: 50%; background: #ffffff; mix-blend-mode: difference; pointer-events: none; z-index: 10000; top: 0; left: 0; transform: translate(-50%,-50%); will-change: left, top; }
    #cursor.hover { width: 40px; height: 40px; }
    #cursorTint { position: fixed; width: 26px; height: 26px; border-radius: 50%; background: #FF4400; mix-blend-mode: screen; pointer-events: none; z-index: 10001; top: 0; left: 0; transform: translate(-50%, -50%); will-change: left, top; opacity: 0; transition: opacity 0.15s ease; }
    #cursorTint.hover { width: 40px; height: 40px; opacity: 1; }

    #menuOverlay { position: fixed; inset: 0; background: #000000; z-index: 500; display: flex; flex-direction: column; padding: 0 36px; opacity: 0; pointer-events: none; transition: opacity 0.35s ease; }
    #menuOverlay.open { opacity: 1; pointer-events: all; }
    .mo-top { height: 72px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .mo-logo { font-size: 18px; font-weight: 600; letter-spacing: -1px; color: #ffffff; font-family: 'Inter Display', sans-serif; }
    .mo-close { font-size: 20px; font-weight: 400; color: #ffffff; background: none; border: none; font-family: 'Inter Display', sans-serif; padding: 0; line-height: 1; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; }
    .mo-nav { flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .mo-nav a { font-size: 96px; font-weight: 600; letter-spacing: -2px; line-height: 1.15; color: #ffffff; display: block; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.08); opacity: 0; transform: translateY(18px); transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94), color 0.2s ease; }
    #menuOverlay.open .mo-nav a:nth-child(1) { opacity:1; transform:translateY(0); transition-delay:0.05s; }
    #menuOverlay.open .mo-nav a:nth-child(2) { opacity:1; transform:translateY(0); transition-delay:0.10s; }
    #menuOverlay.open .mo-nav a:nth-child(3) { opacity:1; transform:translateY(0); transition-delay:0.15s; }
    .mo-nav a:hover { color: #888888; }

    /* ── NAV ── */
    #mainNav {
      position: sticky;
      top: 0;
      z-index: 400;
      height: 72px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 100px;
      background: #ffffff;
      box-shadow: 0 2px 16px rgba(0,0,0,0);
      transition: box-shadow 0.4s ease;
    }
    #mainNav.nav-scrolled {
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    }
    .nav-logo {
      display: flex;
      align-items: center;
    }
    .nav-logo img {
      display: block;
      width: 32px;
      height: 32px;
    }
    .nav-links {
      display: flex;
      gap: 40px;
      align-items: center;
    }
    .nav-links a {
      font-size: 18px;
      font-weight: 500;
      font-family: 'Inter Display', sans-serif;
      color: #111111;
      letter-spacing: -0.3px;
      position: relative;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -3px;
      left: 0;
      width: 100%;
      height: 1px;
      background: #000000;
      transform: scaleX(0);
      transform-origin: right;
      transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .nav-links a:hover::after {
      transform: scaleX(1);
      transform-origin: left;
    }
    /* Active section underline */
    .nav-links a.nav-active::after {
      transform: scaleX(1);
      transform-origin: left;
    }
    .nav-links:hover a.nav-active:not(:hover)::after {
      transform: scaleX(0);
      transform-origin: right;
    }
    .nav-trigger {
      background: none;
      border: none;
      padding: 0;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .dots-grid {
      display: grid;
      grid-template-columns: 5px 5px;
      grid-template-rows: 5px 5px;
      gap: 9px;
      width: 19px;
      height: 19px;
    }
    .dots-grid .dot {
      width: 5px;
      height: 5px;
      background: #000000;
    }

    .proj-wrap { max-width: 1200px; margin: 0 auto; padding: 0; }
    .proj-sec-title { font-size: 32px; font-weight: 500; font-family: 'Inter Display', sans-serif; color: #111111; letter-spacing: -0.05em; line-height: 1.2em; margin: 0 0 24px; }
    .proj-body-text { font-size: 18px; font-weight: 400; font-family: 'Inter Display', sans-serif; color: #767676; line-height: 1.6em; letter-spacing: 0em; margin: 0 0 20px; }
    .proj-img-full {
      display: block;
      width: calc(100% - 200px);
      margin: 60px 100px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 28px rgba(0,0,0,0.08);
    }
    .proj-img-full img, .proj-img-full video { width: 100%; height: auto; display: block; object-fit: initial; border-radius: 10px; }
    .proj-video { width: 100%; aspect-ratio: 16/9; margin: 40px 0; }
    .proj-video iframe { width: 100%; height: 100%; border: none; display: block; }
    .proj-video-caption { font-size: 13px; font-weight: 400; color: #767676; margin: 8px 0 0; }
    .proj-meta { display: flex; gap: 80px; margin: 40px 0 60px; }
    .proj-meta-item label { display: block; font-size: 14px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; color: #111111; margin-bottom: 6px; }
    .proj-meta-item span { font-size: 20px; font-weight: 400; color: #767676; }
    .proj-section { margin: 80px auto; max-width: 80ch; }

    #pwGate { position: fixed; inset: 0; background: #ffffff; z-index: 9999; display: flex; align-items: center; justify-content: center; font-family: 'Inter Display', sans-serif; }
    .pw-box { display: flex; flex-direction: column; align-items: flex-start; gap: 0; max-width: 480px; width: 100%; padding: 0 40px; }
    .pw-logo { font-size: 16px; font-weight: 700; letter-spacing: -0.5px; color: #111111; margin: 0 0 48px; }
    .pw-title { font-size: 48px; font-weight: 600; letter-spacing: -2.4px; line-height: 1; color: #111111; margin: 0 0 12px; }
    .pw-subtitle { font-size: 16px; font-weight: 400; color: #767676; margin: 0 0 40px; }
    .pw-form { display: flex; flex-direction: column; gap: 12px; width: 100%; }
    .pw-form input { width: 100%; font-size: 16px; font-weight: 400; font-family: 'Inter Display', sans-serif; color: #111111; background: transparent; border: none; border-bottom: 1px solid #000000; padding: 12px 0; outline: none; letter-spacing: -0.3px; box-sizing: border-box; }
    .pw-form input::placeholder { color: #767676; }
    .pw-form input.shake { animation: shake 0.4s ease; }
    @keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-8px); } 40% { transform: translateX(8px); } 60% { transform: translateX(-6px); } 80% { transform: translateX(6px); } }
    .pw-form button { align-self: flex-start; margin-top: 8px; font-size: 16px; font-weight: 500; font-family: 'Inter Display', sans-serif; color: #ffffff; background: #000000; border: none; border-radius: 100px; padding: 14px 32px; cursor: none; transition: opacity 0.2s ease; letter-spacing: -0.3px; }
    .pw-form button:hover { opacity: 0.75; }
    .pw-error { font-size: 14px; color: #cc0000; margin: 8px 0 0; display: none; }
    :focus-visible { outline: 2px solid #111111; outline-offset: 3px; border-radius: 2px; }
    #menuOverlay :focus-visible { outline-color: #ffffff; }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; } }

    @media (max-width: 768px) {
      body, body * { cursor: auto; }
      #cursor, #cursorTint { display: none; }
      #mainNav { padding: 0 24px; }
      .nav-links { display: none; }
      .nav-trigger { display: flex; min-width: 44px; min-height: 44px; }
      #menuOverlay { padding-left: 24px; padding-right: 24px; }
      .mo-top { padding-left: 0; padding-right: 0; }
      .mo-nav a { font-size: 40px; letter-spacing: 0; }
      section { padding-left: 24px !important; padding-right: 24px !important; padding-top: 48px !important; }
      .proj-wrap { padding-left: 24px !important; padding-right: 24px !important; }
      .proj-img-full { width: calc(100% - 12px); margin: 24px 6px; }
      .proj-meta { gap: 24px; flex-wrap: wrap; }
      .proj-meta-item span { font-size: 16px; }
      .proj-sec-title { font-size: 24px; letter-spacing: -0.03em; }
      .proj-body-text { font-size: 16px; line-height: 1.7em; }
      section > h1 { font-size: 36px !important; letter-spacing: -1.5px !important; }
      .proj-next { padding: 32px 24px; }
      .proj-back-link { padding: 20px 24px 0 !important; }
      .proj-back-link a, .proj-back-sep, .proj-back-current { font-size: 13px; }
    }

    /* ── PAGE LOAD ANIMATIONS ── */
    @keyframes enterFromTop {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes enterHero {
      from { opacity: 0; transform: translateY(36px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #mainNav {
      animation: enterFromTop 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .proj-back-link {
      animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.05s both;
    }
    .proj-hero-section h1, section > h1 {
      animation: enterHero 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.1s both;
    }
    .proj-meta, .proj-body-text:first-of-type {
      animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.25s both;
    }

    /* ── VIDEO PLAY OVERLAY ── */
    .video-wrapper { position: relative; border-radius: 10px; overflow: hidden; }
    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.25s ease;
    }
    .play-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .play-circle {
      width: 80px;
      height: 80px;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
      transition: transform 0.2s ease, background 0.2s ease;
    }
    .play-overlay:hover .play-circle {
      transform: scale(1.1);
      background: #fff;
    }
    .play-triangle {
      width: 0;
      height: 0;
      border-top: 13px solid transparent;
      border-bottom: 13px solid transparent;
      border-left: 22px solid #000;
      margin-left: 5px;
    }

    /* ── SCROLL REVEAL ── */
    .reveal-text {
      opacity: 0;
      transform: translateY(100px);
      transition: opacity 1.4s cubic-bezier(0, 0.56, 0.26, 0.97),
                  transform 1.4s cubic-bezier(0, 0.56, 0.26, 0.97);
    }
    .reveal-image {
      opacity: 0;
      transform: translateY(160px);
      transition: opacity 1.4s cubic-bezier(0, 0.56, 0.26, 0.97),
                  transform 1.4s cubic-bezier(0, 0.56, 0.26, 0.97);
    }
    .reveal-text.in, .reveal-image.in {
      opacity: 1;
      transform: translateY(0);
    }

      body.fullscreen-active, body.fullscreen-active * { cursor: auto !important; }
    video:fullscreen { object-fit: contain; }
    video:-webkit-full-screen { object-fit: contain; }

    .proj-back-link { max-width: 100ch; margin: 0 auto; padding: 20px 0 0; display: flex; align-items: center; gap: 8px; }
    .proj-back-link a { font-size: 12px; letter-spacing: 0.06em; color: #767676; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
    .proj-back-link a:hover { color: #111111; }
    .proj-back-sep { font-size: 12px; color: #dddddd; }
    .proj-back-current { font-size: 12px; letter-spacing: 0.06em; color: #333333; }
    .proj-next { display: flex; align-items: center; gap: 24px; padding: 40px 100px; border-top: 1px solid #eeeeee; text-decoration: none; color: #111111; }
    .proj-next:hover .proj-next-title { text-decoration: underline; }
    .proj-next-thumb { width: 120px; height: 80px; object-fit: cover; flex-shrink: 0; }
    .proj-next-text { display: flex; flex-direction: column; gap: 4px; }
    .proj-next-label { font-size: 13px; color: #767676; letter-spacing: 0.05em; }
    .proj-next-title { font-size: 18px; font-weight: 500; letter-spacing: -0.3px; }
    /* ── SECTION DOT NAVIGATOR ── */
    .section-dots { position: fixed; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 200; }
    .section-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(0,0,0,0.18); border: none; padding: 0; cursor: pointer; transition: background 0.3s ease, transform 0.3s ease; flex-shrink: 0; }
    .section-dot.active { background: #111111; transform: scale(1.25); }
    @media (max-width: 768px) { .section-dots { display: none; } }
  </style>
  <script>
    // Windows exposes more CSS pixels than macOS HiDPI on the same monitor,
    // shrinking the fixed-px layout. Scale it back to the 1920px design canvas.
    (function () {
      if (navigator.userAgent.indexOf('Windows') === -1) return;
      var w = window.screen.width;
      if (w > 1920) document.documentElement.style.zoom = w / 1920;
    })();
  </script>
</head>
<body>

<!-- Password Gate -->
<div id="pwGate">
  <div class="pw-box">
    <h2 class="pw-title">Maserati - Next Gen. Experience</h2>
    <p class="pw-subtitle">This project is password protected.</p>
    <form class="pw-form" onsubmit="checkPw(event)">
      <input id="pwInput" type="password" placeholder="Enter password" autocomplete="current-password">
      <button type="submit">Enter →</button>
    </form>
    <p class="pw-error" id="pwError">Incorrect password. Try again.</p>
  </div>
</div>

<div id="cursor"></div>
<div id="cursorTint"></div>

<!-- Menu Overlay -->
<div id="menuOverlay">
  <div class="mo-top">
    <a href="index.html" class="mo-logo">[hs]</a>
    <button class="mo-close" onclick="closeMenu()" aria-label="Close menu">✕</button>
  </div>
  <nav class="mo-nav">
    <a href="index.html#work">Work</a>
    <a href="index.html#about">About</a>
    <a href="index.html#contact">Contact</a>
  </nav>
</div>

<!-- Nav -->
<nav id="mainNav">
  <a href="index.html" class="nav-logo"><img src="logo.png" alt="Hristiyan Stratev"></a>
  <div class="nav-links">
    <a href="index.html#work" class="nav-active">Work</a>
    <a href="index.html#about">About</a>
    <a href="index.html#contact">Contact</a>
  </div>
  <button class="nav-trigger" onclick="toggleMenu()" aria-label="Open menu">
      <span class="dots-grid">
        <span class="dot"></span><span class="dot"></span>
        <span class="dot"></span><span class="dot"></span>
      </span>
    </button>
</nav>

<div class="proj-back-link"><a href="index.html#work"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7.5 1.5L3 6L7.5 10.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Work</a><span class="proj-back-sep">/</span><span class="proj-back-current">Maserati</span></div>

<!-- Case study content is fetched from content/maserati.html only after
     the password check passes — see unlock() below. -->
<div id="projContent"></div>


<script>
  const cur = document.getElementById('cursor');
  const curTint = document.getElementById('cursorTint');
  let mx=0,my=0,cx=0,cy=0;
  window.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
  (function loop(){cx+=(mx-cx)*0.15;cy+=(my-cy)*0.15;cur.style.left=cx+'px';cur.style.top=cy+'px';curTint.style.left=cx+'px';curTint.style.top=cy+'px';requestAnimationFrame(loop);})();
  document.addEventListener('mouseover', function(e){ if (e.target.closest('a,button')) (cur.classList.add('hover'), curTint.classList.add('hover')); });
  document.addEventListener('mouseout', function(e){ if (e.target.closest('a,button')) (cur.classList.remove('hover'), curTint.classList.remove('hover')); });
  function toggleMenu(){const sw=window.innerWidth-document.documentElement.clientWidth;document.body.style.paddingRight=sw+'px';document.getElementById('menuOverlay').style.paddingRight=(parseFloat(getComputedStyle(document.getElementById('menuOverlay')).paddingRight)+sw)+'px';document.getElementById('menuOverlay').classList.add('open');document.body.classList.add('no-scroll');}
  function closeMenu(){document.getElementById('menuOverlay').classList.remove('open');document.body.classList.remove('no-scroll');document.body.style.paddingRight='';document.getElementById('menuOverlay').style.paddingRight='';}
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeMenu();});

  // ── GATED CONTENT LOAD ──
  // The case-study HTML lives in content/maserati.html and is only ever
  // fetched after a correct password — nothing sensitive ships in this
  // file's initial markup (soft gate: filters casual viewers, not a
  // real access-control boundary — see project notes).
  function loadContent() {
    return fetch('content/maserati.html')
      .then(function(r) { return r.text(); })
      .then(function(html) {
        document.getElementById('projContent').innerHTML = html;
        initProjectContent();
      });
  }

  function unlock(withFade) {
    loadContent().then(function() {
      sessionStorage.setItem('projAuth', '1');
      var gate = document.getElementById('pwGate');
      if (withFade) {
        gate.style.transition = 'opacity 0.4s ease';
        gate.style.opacity = '0';
        setTimeout(function() { gate.style.display = 'none'; }, 400);
      } else {
        gate.style.display = 'none';
      }
    });
  }

  function initProjectContent() {
    // ── VIDEO PLAY OVERLAYS ──
    document.querySelectorAll('#projContent .proj-img-full video').forEach(function(video) {
      var wrapper = document.createElement('div');
      wrapper.className = 'video-wrapper';
      video.parentNode.insertBefore(wrapper, video);
      wrapper.appendChild(video);
      var overlay = document.createElement('div');
      overlay.className = 'play-overlay';
      overlay.innerHTML = '<div class="play-circle"><div class="play-triangle"></div></div>';
      wrapper.appendChild(overlay);
      overlay.addEventListener('click', function() {
        video.play();
        overlay.classList.add('hidden');
      });
      video.addEventListener('pause', function() { overlay.classList.remove('hidden'); });
      video.addEventListener('ended', function() { overlay.classList.remove('hidden'); });
    });

    // ── HERO IMAGE ZOOM ──
    var heroImgEl = document.querySelector('#projContent .proj-img-full');
    if (heroImgEl) heroImgEl.classList.add('is-hero');

    // ── SCROLL REVEAL ──
    document.querySelectorAll('#projContent .proj-img-full').forEach(function(el, i) {
      if (i > 0) el.classList.add('reveal-image');
    });
    document.querySelectorAll('#projContent .proj-section').forEach(function(el) {
      el.classList.add('reveal-text');
    });
    var io = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) {
        if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('#projContent .reveal-text, #projContent .reveal-image').forEach(function(el) {
      io.observe(el);
    });

    // ── SECTION DOT NAVIGATOR ──
    var sections = [];
    var hero = document.querySelector('#projContent .proj-hero-section') || document.querySelector('#projContent section');
    if (hero) sections.push(hero);
    document.querySelectorAll('#projContent .proj-section').forEach(function(el) { sections.push(el); });
    if (sections.length < 2) return;
    var container = document.createElement('div');
    container.className = 'section-dots';
    container.setAttribute('aria-hidden', 'true');
    document.body.appendChild(container);
    var dots = sections.map(function(section, i) {
      var btn = document.createElement('button');
      btn.className = 'section-dot';
      btn.setAttribute('aria-label', 'Go to section ' + (i + 1));
      btn.addEventListener('click', function() { section.scrollIntoView({ behavior: 'smooth' }); });
      container.appendChild(btn);
      return btn;
    });
    function updateDots() {
      var mid = window.scrollY + window.innerHeight * 0.5;
      var active = 0;
      sections.forEach(function(s, i) { if (s.offsetTop <= mid) active = i; });
      dots.forEach(function(d, i) { d.classList.toggle('active', i === active); });
    }
    window.addEventListener('scroll', updateDots, { passive: true });
    updateDots();
  }

  (function() {
    if (sessionStorage.getItem('projLastPage') === location.href) {
      sessionStorage.removeItem('projAuth');
    }
    sessionStorage.setItem('projLastPage', location.href);
    if (sessionStorage.getItem('projAuth') === '1') {
      unlock(false);
    }
  })();

  function checkPw(e) {
    e.preventDefault();
    const input = document.getElementById('pwInput');
    const error = document.getElementById('pwError');
    if (input.value === 'visitor1') {
      unlock(true);
    } else {
      input.classList.remove('shake');
      void input.offsetWidth;
      input.classList.add('shake');
      input.value = '';
      error.style.display = 'block';
    }
  }

  // ── MAGNETIC NAV ──
  (function initMagnetic() {
    var items = [].concat(
      Array.from(document.querySelectorAll('.nav-logo')).map(function(el){ return {el:el,strength:0.14,radius:75}; }),
      Array.from(document.querySelectorAll('.nav-links a')).map(function(el){ return {el:el,strength:0.14,radius:75}; })
    );
    window.addEventListener('mousemove', function(e) {
      items.forEach(function(o) {
        var rect = o.el.getBoundingClientRect();
        var cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
        var dx = e.clientX - cx, dy = e.clientY - cy;
        var dist = Math.hypot(dx, dy);
        if (dist < o.radius) {
          o.el.style.transition = 'transform 0.15s ease-out';
          o.el.style.transform = 'translate(' + (dx*o.strength) + 'px,' + (dy*o.strength) + 'px)';
        } else {
          o.el.style.transition = 'transform 0.7s cubic-bezier(0.16,1,0.3,1)';
          o.el.style.transform = '';
        }
      });
    });
  })();
    document.addEventListener('fullscreenchange', function() {
      document.body.classList.toggle('fullscreen-active', !!document.fullscreenElement);
    });

  window.addEventListener('scroll', function() {
    document.getElementById('mainNav').classList.toggle('nav-scrolled', window.scrollY > 0);
  });
  // Page fade transition
  document.addEventListener('DOMContentLoaded', function() { document.body.classList.add('loaded'); });
  window.addEventListener('pageshow', function() { document.body.classList.add('loaded'); });
  document.addEventListener('click', function(e) {
    var link = e.target.closest('a[href]');
    if (!link) return;
    var href = link.getAttribute('href');
    if (href && href !== '#' && !href.startsWith('#') && !href.startsWith('http') && !href.startsWith('mailto')) {
      e.preventDefault();
      document.body.classList.remove('loaded');
      setTimeout(function() { window.location.href = href; }, 350);
    }
  });
</script>
</body>
</html>
