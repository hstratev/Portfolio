<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <title>Contact — Hristiyan Stratev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>

    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      -webkit-font-smoothing: antialiased;
      font-size: 16px;
    }

    body {
      background: #ffffff;
      color: #000000;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      line-height: 1.5;
      overflow-x: hidden;
      cursor: none;
    }

    body.no-scroll { overflow: hidden; }
    body, body * { cursor: none; }

    a { color: inherit; text-decoration: none; }
    img { display: block; width: 100%; height: 100%; object-fit: cover; }

    /* ── CURSOR ── */
    #cursor {
      position: fixed;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #ffffff;
      mix-blend-mode: difference;
      pointer-events: none;
      z-index: 9999;
      top: 0; left: 0;
      transform: translate(-50%, -50%);
      transition: width 0.2s ease, height 0.2s ease;
      will-change: transform;
    }
    #cursor.hover { width: 40px; height: 40px; }

    /* ── MENU OVERLAY ── */
    #menuOverlay {
      position: fixed;
      inset: 0;
      background: #000000;
      z-index: 500;
      display: flex;
      flex-direction: column;
      padding: 0 36px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }
    #menuOverlay.open { opacity: 1; pointer-events: all; }

    .mo-top {
      height: 93px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .mo-logo {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -1px;
      color: #ffffff;
      font-family: 'Inter', sans-serif;
    }
    .mo-close {
      font-size: 20px;
      font-weight: 400;
      color: #ffffff;
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
      line-height: 1;
    }

    .mo-nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .mo-nav a {
      font-size: 48px;
      font-weight: 600;
      letter-spacing: -2px;
      line-height: 1.15;
      color: #ffffff;
      display: block;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94), color 0.2s ease;
    }
    .mo-nav a:first-child { border-top: 1px solid rgba(255,255,255,0.08); }
    #menuOverlay.open .mo-nav a:nth-child(1) { opacity:1; transform:translateY(0); transition-delay:0.05s; }
    #menuOverlay.open .mo-nav a:nth-child(2) { opacity:1; transform:translateY(0); transition-delay:0.10s; }
    #menuOverlay.open .mo-nav a:nth-child(3) { opacity:1; transform:translateY(0); transition-delay:0.15s; }
    .mo-nav a:hover { color: #888888; }

    /* ── NAV ── */
    #mainNav {
      position: static;
      z-index: 400;
      height: 93px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 36px;
      background: transparent;
    }
    .nav-logo {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #000000;
      font-family: 'Inter', sans-serif;
    }
    .nav-trigger {
      background: none;
      border: none;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .dots-grid {
      display: grid;
      grid-template-columns: 5px 5px;
      grid-template-rows: 5px 5px;
      gap: 9px;
      width: 19px;
      height: 19px;
    }
    .dots-grid .dot {
      width: 5px;
      height: 5px;
      background: #000000;
    }

    /* ── HERO ── */
    #hero {
      background: #ffffff;
      padding: 80px;
    }

    .hero-names { margin-bottom: 64px; }

    .hero-name {
      display: block;
      line-height: 174px;
    }
    .hero-name-inner {
      display: block;
      font-size: 174px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      letter-spacing: -8.7px;
      line-height: 174px;
      color: #000000;
      transform: translateY(40px);
      opacity: 0;
      animation: slideUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }
    .hero-name:nth-child(2) .hero-name-inner { animation-delay: 0.1s; }

    @keyframes slideUp {
      to { transform: translateY(0); opacity: 1; }
    }

    .hero-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 40px;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.4s forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-left-col {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .hero-email {
      font-size: 26px;
      font-weight: 500;
      letter-spacing: -1.56px;
      font-family: 'Inter', sans-serif;
      color: #000000;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: opacity 0.2s;
    }
    .hero-email:hover { opacity: 0.6; }
    .icon-copy {
      width: 13px; height: 13px;
      opacity: 0.35;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }
    .hero-email:hover .icon-copy { opacity: 0.75; }

    .hero-bio {
      font-size: 40px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      letter-spacing: -2.4px;
      line-height: 44px;
      text-align: justify;
      color: #000000;
      max-width: 643px;
      flex: 1;
      min-width: 0;
    }

    /* ── CONTACT ACTIONS SECTION ── */
    #contact-actions-section {
      background: #ffffff;
      padding: 80px;
    }

    .contact-actions-row {
      display: flex;
      gap: 32px;
      align-items: center;
      margin-bottom: 48px;
    }
    .cta-btn {
      font-size: 16px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      background: #000000;
      color: #ffffff;
      border: none;
      border-radius: 100px;
      padding: 20px 36px;
      height: 59px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease;
    }
    .cta-btn:hover { background: #333333; }

    .avail-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 400;
      font-family: 'Inter', sans-serif;
      color: #000000;
    }
    .pulse-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #888888;
      animation: pulseDot 2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulseDot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .social-links-row {
      display: flex;
      gap: 32px;
      align-items: center;
    }
    .social-links-row a {
      font-size: 16px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      color: #000000;
      transition: opacity 0.2s;
    }
    .social-links-row a:hover { opacity: 0.55; }

    /* ── FOOTER ── */
    #footer {
      background: #000000;
      padding: 80px;
    }

    .footer-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-left {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .footer-left span,
    .footer-left a {
      font-size: 16px;
      font-weight: 400;
      font-family: 'Inter', sans-serif;
      color: #ffffff;
      transition: opacity 0.2s;
    }
    .footer-left a:hover { opacity: 0.55; }
    .footer-credit,
    .footer-copy {
      font-size: 16px;
      font-weight: 400;
      font-family: 'Inter', sans-serif;
      color: #ffffff;
    }

    /* ── SCROLL REVEAL ── */
    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .reveal.in { opacity: 1; transform: translateY(0); }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      body, body * { cursor: auto; }
      #cursor { display: none; }

      #mainNav { padding: 0 24px; }
      .mo-top,
      #menuOverlay { padding-left: 24px; padding-right: 24px; }
      .mo-nav a { font-size: 32px; }

      #hero {
        padding: 40px 24px 48px;
      }
      .hero-name { line-height: 1.0; }
      .hero-name-inner {
        font-size: clamp(2.8rem, 14vw, 6rem);
        letter-spacing: -4px;
        line-height: 1.0;
      }
      .hero-bottom { flex-direction: column; gap: 28px; padding-top: 32px; }
      .hero-bio { font-size: 22px; letter-spacing: -1px; line-height: 28px; max-width: 100%; }
      .hero-names { margin-bottom: 32px; }

      #contact-actions-section { padding: 48px 24px; }

      #footer { padding: 48px 24px; }
      .footer-row { flex-direction: column; align-items: flex-start; gap: 16px; }
    }

  </style>
</head>
<body>

  <!-- ── CURSOR ── -->
  <div id="cursor"></div>

  <!-- ── MENU OVERLAY ── -->
  <div id="menuOverlay">
    <div class="mo-top">
      <a href="index.html" class="mo-logo">H.Stratev</a>
      <button class="mo-close" onclick="closeMenu()" aria-label="Close menu">✕</button>
    </div>
    <nav class="mo-nav">
      <a href="works.html">Work</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>

  <!-- ── NAV ── -->
  <nav id="mainNav">
    <a href="index.html" class="nav-logo">H.Stratev</a>
    <button class="nav-trigger" onclick="toggleMenu()" aria-label="Open menu">
      <span class="dots-grid">
        <span class="dot"></span><span class="dot"></span>
        <span class="dot"></span><span class="dot"></span>
      </span>
    </button>
  </nav>

  <!-- ── HERO ── -->
  <section id="hero">
    <div class="hero-names">
      <div class="hero-name"><span class="hero-name-inner">GET IN</span></div>
      <div class="hero-name"><span class="hero-name-inner">TOUCH</span></div>
    </div>

    <div class="hero-bottom">
      <div class="hero-left-col">
        <a class="hero-email" id="emailCopy" href="mailto:H.Stratev@gmail.com">
          H.Stratev@gmail.com
          <svg class="icon-copy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
        </a>
      </div>
      <p class="hero-bio">Have a project in mind? Let's collaborate and build something extraordinary together.</p>
    </div>
  </section>

  <!-- ── CONTACT ACTIONS ── -->
  <section id="contact-actions-section" class="reveal">
    <div class="contact-actions-row">
      <a href="mailto:H.Stratev@gmail.com" class="cta-btn">Get in Touch</a>
      <div class="avail-badge">
        <div class="pulse-dot"></div>
        Available For Work
      </div>
    </div>

    <div class="social-links-row">
      <a href="http://www.linkedin.com/in/hstratev" target="_blank">LinkedIn</a>
      <a href="https://twitter.com" target="_blank">Twitter</a>
    </div>
  </section>

  <!-- ── FOOTER ── -->
  <section id="footer">
    <div class="footer-row">
      <div class="footer-left">
        <span>+359 XX XXX XXXX</span>
        <a href="mailto:hstratev@gmail.com">hstratev@gmail.com</a>
      </div>
      <span class="footer-credit">Designed &amp; Developed by Hristiyan Stratev</span>
      <span class="footer-copy">HS © 2025</span>
    </div>
  </section>

  <script>
    /* ── CURSOR LERP ── */
    const cur = document.getElementById('cursor');
    let mx = 0, my = 0, cx = 0, cy = 0;
    window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
    (function loop() {
      cx += (mx - cx) * 0.15;
      cy += (my - cy) * 0.15;
      cur.style.left = cx + 'px';
      cur.style.top  = cy + 'px';
      requestAnimationFrame(loop);
    })();
    document.querySelectorAll('a, button').forEach(el => {
      el.addEventListener('mouseenter', () => cur.classList.add('hover'));
      el.addEventListener('mouseleave', () => cur.classList.remove('hover'));
    });

    /* ── MENU ── */
    function toggleMenu() {
      document.getElementById('menuOverlay').classList.add('open');
      document.body.classList.add('no-scroll');
    }
    function closeMenu() {
      document.getElementById('menuOverlay').classList.remove('open');
      document.body.classList.remove('no-scroll');
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMenu(); });

    /* ── SCROLL REVEAL ── */
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));

    /* ── EMAIL COPY ── */
    document.getElementById('emailCopy').addEventListener('click', e => {
      e.preventDefault();
      navigator.clipboard.writeText('H.Stratev@gmail.com').then(() => {
        const el = document.getElementById('emailCopy');
        const original = el.childNodes[0].textContent;
        el.childNodes[0].textContent = 'Copied! ';
        setTimeout(() => { el.childNodes[0].textContent = original; }, 1800);
      });
    });
  </script>

</body>
</html>
